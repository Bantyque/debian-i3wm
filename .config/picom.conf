#################################
#             Shadows           #
#################################

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -8;
shadow-offset-y = -8;

shadow-exclude = [
  "class_g = 'i3-frame'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;


#################################
#   Transparency / Opacity      #
#################################

frame-opacity = 0.7;
inactive-opacity-override = false;

focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'"
];

opacity-rule = [
  "90:class_g = 'URxvt' && focused",
  "75:class_g = 'URxvt' && !focused"
];


#################################
#           Corners             #
#################################

corner-radius = 8;
round-borders = 1;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];


#################################
#     Background-Blurring       #
#################################

blur-method = "dual_kawase";
blur-size = 8;
blur-strength = 4;
blur-background = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#       General Settings        #
#################################

backend = "glx";
dithered-present = false;
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";


#################################
#         Window Types          #
#################################

wintypes:
{
  tooltip   = { fade = true; shadow = true; opacity = 0.85; focus = true; full-shadow = false; };
  dock      = { shadow = false; clip-shadow-above = true; };
  dnd       = { shadow = false; };
  popup_menu    = { opacity = 0.9; shadow = true; };
  dropdown_menu = { opacity = 0.9; shadow = true; };
  notification  = { shadow = false; };
};
